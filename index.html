<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ざっくりTASK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
/* ── CSS Variables ───────────────────────────────────────────── */
:root {
  --bg:            #F0F2F5;
  --bg2:           #E8EAED;
  --surface:       #FFFFFF;
  --surface2:      #F5F7FA;
  --border:        #D0D5DD;
  --border-focus:  #3B82F6;
  --text:          #1A2B5E;
  --text-muted:    #4D6080;
  --text-light:    #8A9CBD;
  --primary:       #3B82F6;
  --primary-hover: #2563EB;
  --primary-light: #DBEAFE;
  --large-color:   #EF4444;
  --large-bg:      #FCA5A5;
  --large-text:    #991B1B;
  --medium-color:  #FDD835;
  --medium-bg:     #FDE68A;
  --medium-text:   #795500;
  --small-color:   #22C55E;
  --small-bg:      #86EFAC;
  --small-text:    #166534;
  --danger:        #EF4444;
  --danger-bg:     #FEE2E2;
  --radius:        10px;
  --radius-sm:     6px;
  --shadow:        0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Hiragino Sans', sans-serif;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

header h1 {
  display: flex;
  align-items: baseline;
  gap: 4px;
  line-height: 1;
}

.title-ja {
  font-family: 'Space Grotesk', 'Hiragino Sans', sans-serif;
  font-weight: 700;
  font-size: 1.25rem;
  color: var(--text);
  letter-spacing: 0.04em;
}

.title-en {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 1.5rem;
  color: var(--text);
  letter-spacing: 0.04em;
}

.header-actions { display: flex; gap: 6px; }

/* ── Buttons ─────────────────────────────────────────────────── */
button {
  cursor: pointer;
  border: none;
  border-radius: var(--radius-sm);
  padding: 11px 20px;
  min-height: 44px;
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.06em;
  transition: background 0.18s, color 0.18s, border-color 0.18s;
}

.btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0;
  font-size: 0.85rem;
  letter-spacing: 0.04em;
  min-width: 40px;
  min-height: 40px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover { background: var(--bg2); color: var(--text); border-color: var(--border-focus); }

.btn-primary {
  background: var(--primary);
  color: #F7F4EF;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.btn-primary:hover { background: var(--primary-hover); }

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 16px;
  min-height: 38px;
  font-size: 0.9rem;
}
.btn-secondary:hover { background: var(--bg2); color: var(--text); }

.btn-danger {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--danger);
  padding: 9px 18px;
  font-size: 0.9rem;
}
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

/* ── Layout ──────────────────────────────────────────────────── */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* Desktop two-column layout */
.desktop-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-items: start;
}

@media (min-width: 768px) {
  .desktop-layout { grid-template-columns: 62fr 38fr; }
}

.desktop-left {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.desktop-right {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

@media (max-width: 767px) {
  .desktop-layout {
    grid-template-columns: 1fr;
  }
  .desktop-right {
    order: 2;
  }
}

.top-area {
  margin-bottom: 16px;
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.card-title {
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.22em;
  margin-bottom: 18px;
}

/* ── Form (modal) ────────────────────────────────────────────── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 500px) {
  .form-grid { grid-template-columns: 1fr; }
}

.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }

label {
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

input, select, textarea {
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: 'Inter', 'Hiragino Sans', sans-serif;
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

textarea { resize: vertical; min-height: 56px; }

.form-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}

/* ── Calendar header ─────────────────────────────────────────── */
.calendar-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.cal-nav-group { display: flex; align-items: center; gap: 4px; }

.period-label {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text);
  min-width: 130px;
  text-align: center;
}

.today-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 8px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  min-height: 44px;
}
.today-btn:hover { background: var(--bg2); border-color: var(--border-focus); color: var(--text); }

/* ── FAB "+" button ──────────────────────────────────────────── */
.fab-add {
  font-family: 'Inter', sans-serif;
  font-size: 1.3rem;
  font-weight: 300;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: #F7F4EF;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(59,130,246,0.30);
  transition: background 0.18s, transform 0.15s;
  padding: 0;
  flex-shrink: 0;
  margin-left: auto;
}
.fab-add:hover { background: var(--primary-hover); transform: scale(1.08); }

/* ── Date display button (in modal) ──────────────────────────── */
.date-display-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: 'Inter', 'Hiragino Sans', sans-serif;
  background: var(--bg2);
  color: var(--text);
  min-height: 44px;
  text-align: left;
  justify-content: flex-start;
  width: 100%;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
  cursor: pointer;
}
.date-display-btn:hover {
  border-color: var(--border-focus);
  background: var(--surface);
}
.date-display-btn .dp-icon { font-size: 1rem; flex-shrink: 0; }
.date-display-btn.has-value { color: var(--text); }
.date-display-btn:not(.has-value) { color: var(--text-light); }

/* ── Date picker overlay ─────────────────────────────────────── */
#datePickerOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.40);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(2px);
}
#datePickerOverlay.active { display: flex; }

.dp-modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 18px 18px;
  width: min(390px, 96vw);
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  border: 1px solid var(--border);
}

.dp-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.dp-nav-title {
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text);
}

.dp-nav-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 12px;
  min-height: 34px;
  font-size: 1rem;
  border-radius: var(--radius-sm);
}
.dp-nav-btn:hover { background: var(--bg2); }

.dp-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 2px;
}

.dp-day-header {
  font-family: 'Inter', sans-serif;
  text-align: center;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-light);
  letter-spacing: 0.06em;
  padding: 3px 0 6px;
}

.dp-day {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.14s, border-color 0.14s;
  height: 40px;
  width: 100%;
  padding: 0;
}
.dp-day:hover { background: var(--bg2); border-color: var(--border); }
.dp-day.today { border-color: var(--primary); color: var(--primary); font-weight: 700; }
.dp-day.selected { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }
.dp-day.other-month { color: var(--text-light); }
.dp-day.empty { cursor: default; pointer-events: none; }

.dp-footer {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  align-items: center;
}

.dp-today-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 8px 14px;
  min-height: 36px;
  background: var(--primary-light);
  border: 1px solid var(--border-focus);
  color: var(--primary-hover);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.dp-today-btn:hover { background: var(--primary-light); }

.dp-manual-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 8px 14px;
  min-height: 36px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.dp-manual-btn:hover { background: var(--bg2); }

#dpManualInputWrapper {
  display: none;
  margin-top: 10px;
}
#dpManualInputWrapper.active { display: block; }
#dpManualNative {
  display: block;
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  background: var(--bg2);
  color: var(--text);
  margin-bottom: 8px;
}
#dpManualNative:focus {
  outline: none;
  border-color: var(--border-focus);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
#dpManualConfirm {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  padding: 8px 16px;
  min-height: 36px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
}
#dpManualConfirm:hover { background: var(--primary-hover); }

/* ── Calendar grid ───────────────────────────────────────────── */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-header {
  font-family: 'Inter', sans-serif;
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-light);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 0 7px;
}

/* Month view day cells */
.month-cell {
  min-height: 110px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px;
  background: var(--surface2);
  transition: border-color 0.15s, background 0.14s, transform 0.12s ease, box-shadow 0.12s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.month-cell:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(59,130,246,0.12);
  z-index: 1;
}

.month-cell.today {
  border-color: var(--primary);
  background: var(--primary-light);
}

.month-cell.other-month {
  opacity: 0.45;
}

@media (max-width: 767px) {
  .month-cell { min-height: 64px; }
}

.cal-date {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-light);
  margin-bottom: 4px;
  display: block;
  line-height: 1.3;
}

.month-cell.today .cal-date {
  color: var(--primary);
  font-weight: 600;
}

/* Month view: work period bar (Google Calendar style) */
.cal-work-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 17px;
  cursor: pointer;
  transition: opacity 0.1s;
  z-index: 2;
}
.cal-work-bar:hover { opacity: 0.8; }
.cal-work-bar.bar-start  { left: 4px;  border-radius: 3px 0 0 3px; }
.cal-work-bar.bar-end    { right: 4px; border-radius: 0 3px 3px 0; }
.cal-work-bar.bar-single { left: 4px; right: 4px; border-radius: 3px; }
.cal-work-bar:not(.bar-start):not(.bar-end):not(.bar-single) { border-radius: 0; }
/* Work period days: light fill */
.cal-work-bar.large  { background: var(--large-bg); }
.cal-work-bar.medium { background: var(--medium-bg); }
.cal-work-bar.small  { background: var(--small-bg); }
/* Deadline day (bar-end / bar-single): solid fill + title text */
.cal-work-bar.bar-end.large,  .cal-work-bar.bar-single.large  { background: var(--large-color); }
.cal-work-bar.bar-end.medium, .cal-work-bar.bar-single.medium { background: var(--medium-color); }
.cal-work-bar.bar-end.small,  .cal-work-bar.bar-single.small  { background: var(--small-color); }
.cal-work-bar.bar-end, .cal-work-bar.bar-single {
  font-family: 'Inter', sans-serif; font-size: 0.58rem; font-weight: 700;
  color: #fff; display: flex; align-items: center;
  padding: 0 5px; white-space: nowrap; overflow: hidden;
}
/* Done (checked): fade the specific day's segment */
.cal-work-bar.done { opacity: 0.28; }
.cal-deadline-tag.done { opacity: 0.40; }

/* Month view: deadline tag */
.cal-deadline-tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-bottom: 2px;
  cursor: pointer;
  line-height: 1.5;
}
.cal-deadline-tag.large  { background: var(--large-color);  color: #fff; }
.cal-deadline-tag.medium { background: var(--medium-color); color: #fff; }
.cal-deadline-tag.small  { background: var(--small-color);  color: #fff; }

/* ── Task list ───────────────────────────────────────────────── */
.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  transition: border-color 0.18s, background 0.18s;
}

.task-item:hover { border-color: var(--border-focus); background: var(--surface); }

/* Task done: faded, moved to bottom of list */
.task-item.task-done { opacity: 0.38; }
.task-item.task-done .task-title { text-decoration: line-through; color: var(--text-muted); }

/* Star burst animation on checkbox check */
.star-particle {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 13px;
  line-height: 1;
  transform-origin: center center;
  animation: starBurst 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes starBurst {
  0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
  65%  { opacity: 1; }
  100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.15); opacity: 0; }
}

/* Checkbox: hidden by default, reveals on hover (desktop) / always visible (mobile) */
.task-check-wrap {
  width: 0;
  overflow: hidden;
  transition: width 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  align-self: center;
}
.task-item:hover .task-check-wrap { width: 32px; }
@media (hover: none) {
  .task-check-wrap { width: 32px !important; overflow: visible !important; }
}

/* Checkbox: perfect circle */
.task-check {
  width: 22px !important;
  height: 22px !important;
  min-width: 22px !important;
  min-height: 22px !important;
  border-radius: 50% !important;
  border: 2px solid var(--border) !important;
  background: transparent !important;
  cursor: pointer;
  display: flex !important;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  padding: 0 !important;
  flex-shrink: 0;
  align-self: center;
  box-sizing: border-box;
  -webkit-appearance: none;
  appearance: none;
}
.task-check:hover { border-color: var(--primary); }
.task-check.checked { background: var(--primary) !important; border-color: var(--primary) !important; }
.task-check.checked::after {
  content: '';
  width: 5px;
  height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
  display: block;
}


.task-weight-badge {
  width: 3px;
  flex-shrink: 0;
  align-self: stretch;
  border-radius: 2px;
}
.task-weight-badge.large  { background: var(--large-color); }
.task-weight-badge.medium { background: var(--medium-color); }
.task-weight-badge.small  { background: var(--small-color); }

.task-info { flex: 1; min-width: 0; }

/* ── Task edit button (⋮) ────────────────────────────────────── */
.task-edit-btn {
  width: 30px !important;
  height: 30px !important;
  min-width: 30px !important;
  max-width: 30px !important;
  padding: 0 !important;
  background: transparent !important;
  border: none !important;
  border-radius: 50% !important;
  color: var(--text-light);
  font-size: 1.15rem;
  letter-spacing: -0.5px;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  align-self: center;
  opacity: 0;
  transition: opacity 0.18s, background 0.18s, color 0.18s, transform 0.15s;
  display: flex !important;
  align-items: center;
  justify-content: center;
  -webkit-user-drag: none;
  user-select: none;
  outline: none;
}
.task-edit-btn:focus { outline: none; box-shadow: none; }
.task-edit-btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
  border-radius: 50% !important;
}
.task-item:hover .task-edit-btn { opacity: 1; color: var(--text-muted); }
.task-edit-btn:hover {
  background: var(--primary-light) !important;
  color: var(--primary) !important;
  transform: scale(1.08);
}
.task-edit-btn:active { transform: scale(0.95); }
@media (hover: none) {
  .task-edit-btn { opacity: 0.55 !important; }
}

/* ── Tutorial overlay ────────────────────────────────────────── */
.tut-bar {
  position: fixed;
  background: rgba(0,0,0,0.60);
  z-index: 8999;
  pointer-events: all;

.task-input-modal { width: min(480px, 96vw); }

.modal-header {

/* Toast notifications */
#toastContainer {

  top: 72px;

.notif-toast {

@keyframes toastIn {

.notif-toast.start  { background: var(--primary-light); border-color: var(--primary); color: var(--primary-hover); }
.notif-toast.warn   { background: var(--medium-bg); border-color: var(--medium-color); color: var(--medium-text); }
.notif-toast.urgent { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }

.toast-close {

.toast-close:hover { opacity: 1; }
@media (max-width: 600px) {
  #toastContainer { right: 8px; left: 8px; max-width: none; top: 68px; }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 600px) {
  .card { padding: 14px; }
  .url-info-card { flex-wrap: wrap; }
  .url-copy-btn { width: 100%; text-align: center; }
}

let _fbDb = null;
let _fbEnabled = false;

function initFirebase() {
  if (!FIREBASE_CONFIG.databaseURL) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.database();
    _fbEnabled = true;
    setSyncStatus('ok');
  } catch(e) {
    console.warn('Firebase init failed:', e);
  }
}

function fbPath() {
  const pid = localStorage.getItem('personalId');
  return pid ? `rooms/${pid}/tasks` : null;
}

function setSyncStatus(state) {
  /* sync hidden */
}

function saveToFirebase() {
  if (!_fbEnabled) return;
  const path = fbPath();
  if (!path) return;
  setSyncStatus('syncing');
  _fbDb.ref(path).set(tasks)
    .then(() => setSyncStatus('ok'))
    .catch(() => setSyncStatus('err'));
}

function startRealtimeListener() {
  if (!_fbEnabled) return;
  const path = fbPath();
  if (!path) return;
  _fbDb.ref(path).on('value', snap => {
    const data = snap.val();
    if (data === null || Array.isArray(data)) {
      tasks = data || [];
      localStorage.setItem('tasks', JSON.stringify(tasks));
      renderAll();
    }
    setSyncStatus('ok');
  }, () => setSyncStatus('err'));
}

async function loadFromFirebase() {
  if (!_fbEnabled) return false;
  const path = fbPath();
  if (!path) return false;
  try {
    setSyncStatus('syncing');
    const snap = await _fbDb.ref(path).once('value');
    const data = snap.val();
    if (data === null || Array.isArray(data)) {
      tasks = data || [];
      localStorage.setItem('tasks', JSON.stringify(tasks));
      setSyncStatus('ok');
      return true;
    }
    setSyncStatus('ok');
    return false;
  } catch(e) {
    setSyncStatus('err');
    return false;
  }
}

// ── URL encode / decode ────────────────────────────────────────
function encodeTasks(arr) {
  try { return btoa(encodeURIComponent(JSON.stringify(arr))); } catch(e) { return ''; }
}

function decodeTasks(str) {
  try { const arr = JSON.parse(decodeURIComponent(atob(str))); return Array.isArray(arr) ? arr : null; } catch(e) { return null; }
}

function genPersonalId() {
  return 'p_' + Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 8);
}

function updateURLHash() {
  const pid = localStorage.getItem('personalId');
  if (_fbEnabled) {
    // Firebase mode: URL always shows personal ID only
    if (pid) history.replaceState(null, '', '#' + pid);
    return;
  }
  if (tasks.length === 0) {
    if (pid) history.replaceState(null, '', '#' + pid);
    return;
  }
  const encoded = encodeTasks(tasks);
  if (encoded) history.replaceState(null, '', '#' + encoded);
}

async function loadInitialTasks() {
  const hash = location.hash.slice(1);

  // 個人IDを確保（Firebase・非Firebase共通）
  if (hash && hash.startsWith('p_')) {
    localStorage.setItem('personalId', hash);
  } else if (!hash) {
    const pid = localStorage.getItem('personalId') || genPersonalId();
    localStorage.setItem('personalId', pid);
    history.replaceState(null, '', '#' + pid);
  }

  // Firebase初期化を試みる
  initFirebase();

  if (_fbEnabled) {
    const loaded = await loadFromFirebase();
    if (!loaded) {
      // Firebaseにデータなし → URLやlocalStorageから移行
      if (hash && !hash.startsWith('p_')) {
        const decoded = decodeTasks(hash);
        if (decoded !== null) {
          tasks = decoded;
          localStorage.setItem('tasks', JSON.stringify(tasks));
          saveToFirebase();
          history.replaceState(null, '', '#' + localStorage.getItem('personalId'));
        }
      } else {
        tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        if (tasks.length > 0) saveToFirebase();
      }
    }
    startRealtimeListener();
    return;
  }

  // 非Firebaseモード：URLエンコード方式
  if (hash && !hash.startsWith('p_')) {
    const decoded = decodeTasks(hash);
    if (decoded !== null) {
      tasks = decoded;
      localStorage.setItem('tasks', JSON.stringify(tasks));
      return;
    }
  }

  tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  if (tasks.length > 0) updateURLHash();
}

// ── Date utilities ─────────────────────────────────────────────
function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function parseLocalDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function todayDate() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

function fmtShort(dateStr) {
  const d = parseLocalDate(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtDateDisplay(dateStr) {
  if (!dateStr) return '';
  const d = parseLocalDate(dateStr);
  if (lang === 'ja') {
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  } else {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }
}

// ── Task logic ─────────────────────────────────────────────────
function workDays(weight) {
  const v = settings[weight];
  return (v === 0 || v === '0') ? 0 : Math.max(1, parseInt(v) || 1);
}

function taskStartDate(task) {
  return addDays(parseLocalDate(task.deadline), -workDays(task.weight));
}

function inWorkPeriod(task, dateStr) {
  const s = localDateStr(taskStartDate(task));
  return dateStr >= s && dateStr <= task.deadline;
}

// ── Callback-based date picker ─────────────────────────────────
function openDatePicker(callback, prefillDateStr) {
  _dpCallback = callback;
  if (prefillDateStr) {
    const d = parseLocalDate(prefillDateStr);
    dpMonth = new Date(d.getFullYear(), d.getMonth(), 1);
  } else {
    dpMonth = new Date(todayDate().getFullYear(), todayDate().getMonth(), 1);
  }
  document.getElementById('dpManualInputWrapper').classList.remove('active');
  renderDatePicker();
  document.getElementById('datePickerOverlay').classList.add('active');
}

function closeDatePicker() {
  document.getElementById('datePickerOverlay').classList.remove('active');
}

function renderDatePicker() {
  const grid = document.getElementById('dpGrid');
  grid.innerHTML = '';

  const year = dpMonth.getFullYear();
  const month = dpMonth.getMonth();
  const todayStr = localDateStr(todayDate());

  if (lang === 'ja') {
    document.getElementById('dpMonthLabel').textContent = `${year}年${month + 1}月`;
  } else {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dpMonthLabel').textContent = `${months[month]} ${year}`;
  }

  const dayHeaders = t('days');
  dayHeaders.forEach(d => {
    const h = document.createElement('div');
    h.className = 'dp-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('button');
    empty.className = 'dp-day empty';
    grid.appendChild(empty);
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const btn = document.createElement('button');
    btn.className = 'dp-day';
    if (ds === todayStr) btn.classList.add('today');
    btn.textContent = d;
    btn.addEventListener('click', () => {
      if (_dpCallback) { _dpCallback(ds); _dpCallback = null; }
      closeDatePicker();
    });
    grid.appendChild(btn);
  }
}

function renderMonthCalendar() {

  const month = currentMonthDate.getMonth();

    document.getElementById('calPeriodLabel').textContent = `${months[month]} ${year}`;
  }

  days.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-header';
    h.textContent = d;

  });

  // First day of month offset (Mon=0)
  const firstDay = new Date(year, month, 1);

  // Previous month filler
  for (let i = 0; i < startOffset; i++) {
    const prevDate = new Date(year, month, -startOffset + i + 1);
    const cell = document.createElement('div');
    cell.className = 'month-cell other-month';
    const num = document.createElement('span');
    num.className = 'cal-date';
    num.textContent = prevDate.getDate();
    cell.appendChild(num);
    grid.appendChild(cell);
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (ds === todayStr ? ' today' : '');
    cell.dataset.ds = ds;

    const num = document.createElement('span');
    num.className = 'cal-date';
    num.textContent = d;
    cell.appendChild(num);

    // Work period bars (absolute positioned, Google Calendar style)
    const workPeriodTasks = tasks.filter(task => {
      const startS = localDateStr(taskStartDate(task));
      return ds >= startS && ds <= task.deadline;
    });
    workPeriodTasks.forEach((task, idx) => {
      const startS = localDateStr(taskStartDate(task));
      const isStart = ds === startS;
      const isEnd   = ds === task.deadline;
      let posClass = '';
      if (isStart && isEnd) posClass = 'bar-single';
      else if (isStart) posClass = 'bar-start';
      else if (isEnd)   posClass = 'bar-end';
      const completedArr = task.completedDays || [];
      const doneClass = completedArr.includes(ds) ? ' done' : '';
      const bar = document.createElement('div');
      bar.className = `cal-work-bar ${task.weight}${posClass ? ' ' + posClass : ''}${doneClass}`;
      bar.style.bottom = `${idx * 19}px`;
      bar.title = task.title;
      if (isEnd || posClass === 'bar-single') {
        bar.textContent = (completedArr.includes(ds) ? '✓ ' : '') + task.title;
      }
      bar.addEventListener('click', e => { e.stopPropagation(); openTaskDetail(task.id, ds); });
      cell.appendChild(bar);
    });


    // Clicking a day cell opens task input modal with date pre-filled
    cell.addEventListener('click', () => {
      soundTap();
      openTaskInputModal(ds);
    });

    grid.appendChild(cell);
  }

  // Fill remaining cells
  const totalCells = startOffset + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    const extra = 7 - remainder;
    for (let i = 1; i <= extra; i++) {
      const cell = document.createElement('div');
      cell.className = 'month-cell other-month';
      const num = document.createElement('span');
      num.className = 'cal-date';
      num.textContent = i;
      cell.appendChild(num);
      grid.appendChild(cell);
    }
  }
}

function toggleTaskDone(id, skipAnimation, contextDateStr) {
  const task = tasks.find(tk => tk.id === id);
  if (!task) return;
  if (!task.completedDays) task.completedDays = [];
  const vds = contextDateStr || localDateStr(viewDate);
  const isMarkingDone = !task.completedDays.includes(vds);
  if (isMarkingDone) {
    // Add all days from task start up to and including vds
    const start = taskStartDate(task);
    let d = new Date(start.getTime());
    while (true) {
      const ds = localDateStr(d);
      if (!task.completedDays.includes(ds)) task.completedDays.push(ds);
      if (ds >= vds) break;
      d.setDate(d.getDate() + 1);
    }
  } else {
    // Remove vds and all days after it
    task.completedDays = task.completedDays.filter(d => d > vds);
  }
  saveTasks();
  renderAll();
}

function toggleTaskDoneFromDetail(id, contextDateStr) {
  const task = tasks.find(tk => tk.id === id);
  if (task) {
    const vds = contextDateStr || localDateStr(viewDate);
    const isMarkingDone = !(task.completedDays || []).includes(vds);
    if (isMarkingDone) {
      soundCheckDone();
    } else {
      soundUncheck();
    }
  }
  toggleTaskDone(id, true, contextDateStr);
  openTaskDetail(id, contextDateStr);
}

function updateViewDateLabel() {

function renderTaskList() {
  const list = document.getElementById('taskList');
  const vds = localDateStr(viewDate);
  updateViewDateLabel();
  const active = tasks.filter(task => {
    const startS = localDateStr(taskStartDate(task));
    return vds >= startS && vds <= task.deadline;
  }).sort((a, b) => a.deadline.localeCompare(b.deadline));
  const unchecked = active.filter(t => !(t.completedDays || []).includes(vds));
  const checked   = active.filter(t =>  (t.completedDays || []).includes(vds));
  const sorted = [...unchecked, ...checked];
  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty">${t('emptyList')}</div>`;
    return;
  }
  list.innerHTML = sorted.map(task => {
    const startS = localDateStr(taskStartDate(task));
    const isDone = (task.completedDays || []).includes(vds);
    const memoHtml = task.memo ? `<div class="task-memo">${esc(task.memo)}</div>` : '';
    return `
    <div class="task-item${isDone ? ' task-done' : ''}" data-id="${task.id}">
      <div class="task-check-wrap">
        <button class="task-check${isDone ? ' checked' : ''}" onclick="event.stopPropagation();handleTaskCheck('${task.id}')"></button>
      </div>
      <div class="task-weight-badge ${task.weight}"></div>
      <div class="task-info">
        <div class="task-title">${esc(task.title)}</div>
        <div class="task-meta">
          <span class="chip ${task.weight}">${t(task.weight)}</span>
          &nbsp;${fmtShort(startS)} → ${fmtShort(task.deadline)}
        </div>
        ${memoHtml}
      </div>
      <button class="task-edit-btn" draggable="false" onclick="event.stopPropagation();openTaskDetail('${task.id}')" title="編集">⋮</button>
    </div>`;
  }).join('');
}

// ── Notifications ──────────────────────────────────────────────
function checkNotifications() {
  const todayStr = localDateStr(todayDate());
  tasks.forEach(task => {
    if ((task.completedDays || []).length >= workDays(task.weight)) return;
    const startS    = localDateStr(taskStartDate(task));
    const deadlineS = task.deadline;
    const d2Date    = addDays(parseLocalDate(deadlineS), -2);
    const d2S       = localDateStr(d2Date);
    const showD2    = d2S > startS;
    if (todayStr === startS)              maybeShowToast(task, 'start');
    if (showD2 && todayStr === d2S)       maybeShowToast(task, 'warn');
    if (todayStr === deadlineS)           maybeShowToast(task, 'urgent');
  });
}

function maybeShowToast(task, type) {
  const todayStr = localDateStr(todayDate());
  const key = `toast_${task.id}_${type}_${todayStr}`;
  if (localStorage.getItem(key)) return;
  localStorage.setItem(key, '1');
  showToast(task, type);
}

function showToast(task, type) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const msg = type === 'start'  ? t('notifStart',  task.title)
            : type === 'warn'   ? t('notifWarn',   task.title)
            :                     t('notifUrgent', task.title);
  const toast = document.createElement('div');
  toast.className = `notif-toast ${type}`;
  toast.innerHTML = `<span class="toast-msg">${esc(msg)}</span><button class="toast-close" onclick="this.closest('.notif-toast').remove()">✕</button>`;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 8000);
  // Play notification sound (with AudioContext resume attempt)
  try {
    if (_audioCtx) _audioCtx.resume().then(() => soundNotif()).catch(() => {});
    else { const tmp = _ctx(); tmp.resume().then(() => soundNotif()).catch(() => {}); }
  } catch(e) {}
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification(lang === 'ja' ? 'ざっくりTASK' : 'ROUGH TASK', { body: msg }); } catch(e) {}
  }
}

function clearToasts() {
  const c = document.getElementById('toastContainer');
  if (c) c.innerHTML = '';
}

function checkNotificationsForNewTask(task) {
  const todayStr = localDateStr(todayDate());
  const startS    = localDateStr(taskStartDate(task));
  const deadlineS = task.deadline;
  if (todayStr >= startS && todayStr < deadlineS) maybeShowToast(task, 'start');
  if (todayStr === deadlineS) maybeShowToast(task, 'urgent');
}

// ── Sound effects (glass-on-marble) ──────────────────────────
let _audioCtx = null;
function _ctx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
document.addEventListener('touchstart', () => { if (_audioCtx) _audioCtx.resume(); }, { passive: true });

function _click(vol, freq, decay, delay = 0) {
  try {
    const ctx = _ctx();
    const len = Math.ceil(ctx.sampleRate * 0.004);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = freq;
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 9000;
    const g = ctx.createGain();
    const t0 = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + decay);
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(ctx.destination);
    src.start(t0); src.stop(t0 + decay + 0.01);
  } catch(e){}
}
function _ring(freq, delay, dur, vol) {
  try {
    const ctx = _ctx();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    const t0 = ctx.currentTime + delay;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.start(t0); osc.stop(t0 + dur + 0.01);
  } catch(e){}
}
function _sweep(vol, freqStart, freqEnd, dur) {
  try {
    const ctx = _ctx();
    const len = Math.ceil(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len) * 0.6;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(freqStart, ctx.currentTime);
    bp.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.connect(bp); bp.connect(g); g.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + dur + 0.01);
  } catch(e){}
}

  if (!selectedTaskId) return;
  openEditModal(selectedTaskId);
});

document.getElementById('deleteTaskBtn').addEventListener('click', () => {
  if (!selectedTaskId) return;
  tasks = tasks.filter(tk => tk.id !== selectedTaskId);
  saveTasks();
  soundDelete();
  document.getElementById('taskDetailOverlay').classList.remove('active');
  renderAll();
});

// ── Global tap sound (all buttons except those with own sounds) ─
document.addEventListener('click', e => {
  const btn = e.target.closest('button');

  const id = btn.id;

  if (btn.classList.contains('dp-day')) return;
  if (btn.classList.contains('task-check')) return;

let _tutStep = -1;
let _tutWaitFor = null; // null | 'taskAdded' | 'taskChecked'
let _tutDragged = false;

const _TUT = [

function tutInit() {
  if (localStorage.getItem('tutorialDone')) return;
  _tutStep = 0;
  _tutDragged = false;
  _tutInitDrag();
  _tutRender();
}

function _tutInitDrag() {
  const box = document.getElementById('tutMsgBox');
  if (!box || box._tutDragInit) return;
  box._tutDragInit = true;
  let dragging = false, ox, oy, bx, by;
  const start = (e) => {
    if (e.target.closest('#tutNextBtn')) return;
    dragging = true;
    const t = e.touches ? e.touches[0] : e;
    ox = t.clientX; oy = t.clientY;
    const r = box.getBoundingClientRect();
    bx = r.left; by = r.top;
    box.style.cursor = 'grabbing';
    e.preventDefault();
  };
  const move = (e) => {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - ox, dy = t.clientY - oy;
    box.style.left = `${bx + dx}px`;
    box.style.top = `${by + dy}px`;
    box.style.bottom = 'auto';
    box.style.transform = 'none';
    _tutDragged = true;
    e.preventDefault();
  };
  const end = () => { dragging = false; box.style.cursor = 'grab'; };
  box.addEventListener('mousedown', start);
  box.addEventListener('touchstart', start, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
  box.style.cursor = 'grab';
}

function _tutTargetEl(targetKey) {
  if (!targetKey) return null;
  if (targetKey === '+3') {
    const ds = localDateStr(addDays(todayDate(), 3));
    return document.querySelector(`.month-cell[data-ds="${ds}"]`);
  }
  if (targetKey === '+5') {
    const ds = localDateStr(addDays(todayDate(), 5));
    return document.querySelector(`.month-cell[data-ds="${ds}"]`);
  }
  if (targetKey === 'taskCheck') {
    // Force checkbox visible (desktop hides it via width:0 by default)
    document.querySelectorAll('.task-check-wrap').forEach(w => {
      w.style.width = '32px';
      w.style.overflow = 'visible';
    });
    // Spotlight the whole task card for a clear, large target
    return document.querySelector('.task-item:not(.task-done)') || document.querySelector('.task-item');
  }
  return document.getElementById(targetKey) || document.querySelector(targetKey);
}

function _tutSpotlight(el) {
  const bars = [1,2,3,4].map(n => document.getElementById('tutBar'+n));
  const blocker = document.getElementById('tutBlocker');
  if (!el) {
    // No specific target: full-screen dim, block all interaction
    bars.forEach(b => { b.style.cssText = 'display:none'; });
    if (blocker) blocker.style.display = 'block';
    return;
  }
  // Spotlight: hide full blocker, use 4 bars to expose target
  if (blocker) blocker.style.display = 'none';
  const r = el.getBoundingClientRect();
  const pad = 8;
  const bg = 'rgba(0,0,0,0.58)';
  bars[0].style.cssText = `display:block;position:fixed;background:${bg};z-index:8999;pointer-events:all;top:0;left:0;right:0;height:${Math.max(0,r.top-pad)}px`;
  bars[1].style.cssText = `display:block;position:fixed;background:${bg};z-index:8999;pointer-events:all;top:${r.bottom+pad}px;left:0;right:0;bottom:0`;
  bars[2].style.cssText = `display:block;position:fixed;background:${bg};z-index:8999;pointer-events:all;top:${r.top-pad}px;left:0;width:${Math.max(0,r.left-pad)}px;height:${r.height+pad*2}px`;
  bars[3].style.cssText = `display:block;position:fixed;background:${bg};z-index:8999;pointer-events:all;top:${r.top-pad}px;left:${r.right+pad}px;right:0;height:${r.height+pad*2}px`;
}

function _tutRender() {
  if (_tutStep < 0 || _tutStep >= _TUT.length) { _tutEnd(); return; }
  const s = _TUT[_tutStep];
  // Step counter
  const stepEl = document.getElementById('tutStep');
  if (stepEl) stepEl.textContent = `STEP ${_tutStep + 1} / ${_TUT.length}`;
  document.getElementById('tutMsg').textContent = s.msg;
  // Action hint (reset style to default blue before applying)
  const ah = document.getElementById('tutActionHint');
  if (ah) {
    ah.textContent = s.action || '';
    ah.style.display = s.action ? 'block' : 'none';
    ah.style.background = 'var(--primary-light)';
    ah.style.color = 'var(--primary)';
  }
  const nb = document.getElementById('tutNextBtn');
  nb.style.display = s.btn ? 'inline-block' : 'none';
  if (s.btn) nb.textContent = s.btn;
  _tutWaitFor = s.wait || null;
  const targetEl = _tutTargetEl(s.target);
  _tutSpotlight(targetEl);
  const box = document.getElementById('tutMsgBox');
  box.style.display = 'block';
  // Auto-position (only if not dragged by user)
  if (!_tutDragged) {
    if (s.msgPos === 'bottom') {
      box.style.top = 'auto'; box.style.bottom = '30px';
      box.style.left = '50%'; box.style.transform = 'translateX(-50%)';
    } else {
      box.style.top = '72px'; box.style.bottom = 'auto';
      box.style.left = '50%'; box.style.transform = 'translateX(-50%)';
    }
  }
  // Ensure modals appear above tutorial overlay
  const taskOverlay = document.getElementById('taskInputOverlay');
  if (taskOverlay) taskOverlay.style.zIndex = '9100';
  const detailOverlay = document.getElementById('taskDetailOverlay');
  if (detailOverlay) detailOverlay.style.zIndex = '9100';
  const settingsOverlay = document.getElementById('settingsOverlay');
  if (settingsOverlay) settingsOverlay.style.zIndex = '9100';
}

function tutNext() {
  _tutStep++;
  _tutRender();
}

function _tutEnd() {
  localStorage.setItem('tutorialDone', '1');
  _tutStep = -1;
  _tutWaitFor = null;
  _tutDragged = false;
  const blocker = document.getElementById('tutBlocker');
  if (blocker) blocker.style.display = 'none';
  [1,2,3,4].forEach(n => {
    const el = document.getElementById('tutBar'+n);
    if (el) el.style.cssText = 'display:none';
  });
  const box = document.getElementById('tutMsgBox');
  if (box) { box.style.display = 'none'; box.style.cssText = 'display:none'; }
  // Restore check-wrap styles forced during taskCheck step
  document.querySelectorAll('.task-check-wrap').forEach(w => {
    w.style.width = ''; w.style.overflow = '';
  });
  // Restore modal z-indices
  ['taskInputOverlay','taskDetailOverlay','settingsOverlay'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.zIndex = '';
  });
}

function tutOnTaskAdded(task) {
  if (_tutWaitFor !== 'taskAdded') return;
  const s = _TUT[_tutStep];
  // Weight requirement check (e.g. step 4 needs 'large')
  if (s && s.requireWeight && task && task.weight !== s.requireWeight) {
    // Wrong weight: show red warning, keep spotlight (re-applied by renderAll → _tutReposSpotlight)
    const ah = document.getElementById('tutActionHint');
    if (ah) {
      const weightLabel = { large: '大', medium: '中', small: '小' };
      ah.textContent = `⚠️ 重さ「${weightLabel[s.requireWeight] || s.requireWeight}」を選んで追加してください`;
      ah.style.display = 'block';
      ah.style.background = '#FEE2E2';
      ah.style.color = '#DC2626';
    }
    return; // do NOT advance
  }
  _tutWaitFor = null;
  _tutStep++;
  setTimeout(_tutRender, 500);
}

function tutOnTaskChecked() {
  if (_tutWaitFor === 'taskChecked') {
    _tutWaitFor = null;
    _tutStep++;
    setTimeout(_tutRender, 600);
  }
}

// ── Init ───────────────────────────────────────────────────────
function renderAll() {
  renderCalendar();
  renderTaskList();
  renderURLInfoCard();
  checkNotifications();
  // Re-apply spotlight after DOM updates (calendar cells are recreated on render)
  if (_tutStep >= 0) _tutReposSpotlight();
}

function _tutReposSpotlight() {
  if (_tutStep < 0 || _tutStep >= _TUT.length) return;
  const s = _TUT[_tutStep];
  if (!s.target) return;
  const el = _tutTargetEl(s.target);
  if (el) _tutSpotlight(el);
}

loadInitialTasks().then(() => {
  applyLang();
  renderAll();
  tutInit();
});
